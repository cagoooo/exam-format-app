<!doctype html>
<html lang="zh-Hant" data-app-version="2026.07.06-5">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>考卷格式自動校正系統</title>
  <meta name="description" content="固定版面、頁數檢查、Word 與 PDF 輸出的考卷格式標準化工具。">
  <meta name="theme-color" content="#246b54">
  <link rel="canonical" href="https://cagoooo.github.io/exam-format-app/">
  <link rel="icon" href="static/assets/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="static/assets/favicon.svg">
  <link rel="apple-touch-icon" href="static/assets/apple-touch-icon.png">
  <link rel="manifest" href="static/manifest.webmanifest">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="zh_TW">
  <meta property="og:site_name" content="桃園市龍潭區石門國民小學">
  <meta property="og:url" content="https://cagoooo.github.io/exam-format-app/">
  <meta property="og:title" content="考卷格式自動校正系統">
  <meta property="og:description" content="固定版面、頁數檢查、Word 與 PDF 輸出的考卷格式標準化工具。">
  <meta property="og:image" content="https://cagoooo.github.io/exam-format-app/static/assets/og-exam-format.png?v=20260706-og1">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="考卷格式自動校正系統">
  <meta name="twitter:description" content="固定版面、頁數檢查、Word 與 PDF 輸出的考卷格式標準化工具。">
  <meta name="twitter:image" content="https://cagoooo.github.io/exam-format-app/static/assets/og-exam-format.png?v=20260706-og1">
  <link rel="stylesheet" href="static/styles.css?v=2026.07.06-5">
  <script>
    window.EXAM_FORMAT_API_BASE = "https://exam-format-api-142975838924.asia-east1.run.app";
  </script>
</head>
<body>
  <main class="app-shell">
    <section class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">桃園市龍潭區石門國民小學</p>
          <h1>考卷格式自動校正系統</h1>
        </div>
        <button id="clearBtn" class="icon-button" title="清除暫存檔" type="button">⟲</button>
      </header>

      <form id="convertForm" class="editor">
        <section class="panel upload-panel">
          <label class="dropzone" for="fileInput">
            <input id="fileInput" name="file" type="file" accept=".doc,.docx" required>
            <span class="upload-icon">↑</span>
            <strong id="fileLabel">拖曳或選擇考卷 Word 檔</strong>
            <small>線上版支援 .docx / .doc，上傳後會套用固定格式並輸出 Word 與 PDF。</small>
          </label>

          <div class="profile-grid" role="radiogroup" aria-label="格式版本">
            <label class="profile-card">
              <input type="radio" name="profile" value="b4-horizontal" checked>
              <span>B4 橫式雙欄</span>
              <small>2 欄 · 欄距 425 twips</small>
            </label>
            <label class="profile-card">
              <input type="radio" name="profile" value="b4-vertical">
              <span>B4 直式雙欄</span>
              <small>2 欄 · 直式評量範本</small>
            </label>
            <label class="profile-card">
              <input type="radio" name="profile" value="a4-horizontal">
              <span>A4 橫式雙欄</span>
              <small>2 欄 · 平時測驗</small>
            </label>
            <label class="profile-card">
              <input type="radio" name="profile" value="a4-vertical">
              <span>A4 直式雙欄</span>
              <small>2 欄 · 直式 A4 範本</small>
            </label>
          </div>
        </section>

        <section class="panel fields-panel">
          <div class="field-row wide">
            <label>學校</label>
            <input name="school" value="桃園市龍潭區石門國民小學">
          </div>
          <div class="field-row">
            <label>學年度 / 學期</label>
            <input name="semester" value="一百一十五學年度上學期">
          </div>
          <div class="field-row">
            <label>考試名稱</label>
            <input name="exam_name" value="定期評量">
          </div>
          <div class="field-row">
            <label>科別</label>
            <input name="subject" placeholder="國語">
          </div>
          <div class="field-row">
            <label>命題教師</label>
            <input name="teacher" placeholder="阿凱老師">
          </div>
          <div class="field-row">
            <label>年級</label>
            <input name="grade" placeholder="五年">
          </div>
          <div class="field-row">
            <label>班級</label>
            <input name="class_name" placeholder="甲班">
          </div>
          <div class="field-row">
            <label>時間</label>
            <input name="duration" placeholder="40 分鐘">
          </div>
          <div class="field-row">
            <label>目標頁數</label>
            <input name="target_pages" value="2" inputmode="numeric">
          </div>
        </section>

        <section class="actions">
          <button id="analyzeBtn" type="button" class="secondary">分析原始檔</button>
          <button id="convertBtn" type="submit" class="primary">校正並輸出 Word</button>
        </section>
      </form>
    </section>

    <aside class="status-panel">
      <h2>轉換狀態</h2>
      <div id="status" class="status idle">尚未選擇檔案</div>
      <div id="pageBadge" class="page-badge" hidden></div>
      <img id="pdfPreview" class="pdf-preview" alt="PDF 第一頁預覽" hidden>
      <div id="preview" class="preview"></div>
      <div class="download-row">
        <a id="downloadLink" class="download" href="#" hidden>下載校正後 DOCX</a>
        <a id="pdfLink" class="download secondary-download" href="#" hidden>下載 PDF</a>
      </div>
      <div id="report" class="report" hidden></div>
      <div class="rule-list">
        <h3>固定規則</h3>
        <p>B4/A4 頁面尺寸、雙欄、欄距、頁邊距、表頭、中文字型、段落行距與題號縮排會重新套用；轉換後會同步檢查 PDF 頁數。</p>
      </div>
    </aside>
  </main>
  <script src="static/app.js?v=2026.07.06-5"></script>
  <script src="static/sw-update.js?v=2026.07.06-5"></script>
</body>
</html>
